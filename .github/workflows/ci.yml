name: CI

on:
  # Fire on every PR regardless of base branch so stacked PRs (where the base
  # is itself a feature branch, e.g. claude/foo -> claude/bar -> main) still
  # get lint/typecheck/test/build verified. The previous `branches: [main]`
  # filter meant only PRs to main ran CI, so reviewers on stacked PRs saw
  # "no checks" and couldn't tell whether the code built or tested green.
  pull_request:
  push:
    branches: [main]

# Cancel older runs on the same ref when a new one starts (saves CI minutes
# during rapid pushes / force-pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + typecheck + test + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
